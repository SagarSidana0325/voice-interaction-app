<div class="premium-wrapper">
  <div class="glass-panel">

    <div class="chat-header">
      <h2>{{ title() }}</h2>
      <p>Auto-sends after a brief pause</p>
    </div>

    <div class="chat-container">
      
      @if (chatHistory().length === 0) {
        <div style="margin: auto; text-align: center; color: #64748b; font-size: 15px; display: flex; flex-direction: column; align-items: center; gap: 12px;">
          <div style="width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 24px;">
            🎙️
          </div>
          Tap the mic and say hello
        </div>
      }

      @for (msg of chatHistory(); track $index) {
        <div class="chat-message" 
             [class.msg-user]="msg.sender === 'User'" 
             [class.msg-bot]="msg.sender === 'Bot'">
          {{ msg.text }}
        </div>
      }
    </div>

    @if (recognizedText() || isRecording()) {
      <div class="transcription-box">
        @if (recognizedText()) {
          "{{ recognizedText() }}"
        } @else {
          <span style="color: #10b981; display: flex; align-items: center; gap: 8px;">
            <span class="pulsing-dot mic-button-active"></span>
            Listening...
          </span>
        }
      </div>
    }

    <div class="control-area">
      <button 
        (click)="toggleRecording()"
        class="mic-btn"
        [class.mic-button-active]="isRecording()">
        @if (isRecording()) {
           ⏹ 
        } @else {
           🎤
        }
      </button>
    </div>

  </div>

  <router-outlet></router-outlet>
</div>
